name: Android verification

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          cmdline-tools-version: "14742923"
          log-accepted-android-sdk-licenses: false
          packages: >-
            tools platform-tools platforms;android-37.0 build-tools;36.0.0
            ndk;27.0.12077973 cmake;3.22.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          validate-wrappers: true

      - name: Fetch pinned reduced ONNX Runtime
        run: |
          runtime="$GITHUB_WORKSPACE/build/dependencies/onnxruntime-reduced-1.27.0-arm64-v8a.aar"
          ./scripts/fetch_reduced_ort.sh "$runtime"
          echo "NAYTI_ORT_AAR=$runtime" >> "$GITHUB_ENV"

      - name: Run project checks
        env:
          NAYTI_GRADLE_WORKERS: "2"
        run: ./scripts/check.sh

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nayti-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload unsigned release APK
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nayti-release-unsigned-${{ github.sha }}
          path: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            build/reports/nayti-app-release.cdx.json
            build/reports/nayti-app-release-notices.md
          if-no-files-found: error
          retention-days: 7
