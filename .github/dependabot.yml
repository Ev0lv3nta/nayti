version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    groups:
      android-build:
        patterns:
          - "com.android.*"
          - "org.jetbrains.kotlin.*"
          - "com.google.devtools.ksp"
      androidx:
        patterns:
          - "androidx.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Europe/Moscow
    open-pull-requests-limit: 3
